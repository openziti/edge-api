---
id:
  name: id
  required: true
  type: string
  in: path
  description: The id of the requested resource
serviceId:
  name: serviceId
  required: true
  type: string
  in: path
  description: The id of a service
limit:
  name: limit
  type: integer
  in: query
offset:
  name: offset
  type: integer
  in: query
filter:
  name: filter
  type: string
  in: query
withIds:
  name: withIds
  type: boolean
  in: query
  description: |
    When true, each usage breakdown in the response also includes the list of
    entity ids that contribute to the count. Defaults to false to keep
    responses small when the id list is not needed.
token:
  name: token
  type: string
  format: uuid
  in: query
  required: true
token-optional:
  name: token
  type: string
  format: uuid
  in: query
method-optional:
  name: method
  type: string
  in: query
authMethod:
  name: method
  in: query
  required: true
  type: string
  enum:
    - password
    - cert
roleFilter:
  name: roleFilter
  type: array
  in: query
  collectionFormat: multi
  items:
    type: string
roleSemantic:
  name: roleSemantic
  type: string
  in: query
policyType:
  name: policyType
  type: string
  in: query
  enum:
    - dial
    - bind
configTypes:
  name: configTypes
  type: array
  in: query
  collectionFormat: multi
  items:
    type: string