---

paths:
  revocations:
    get:
      summary: List Revocations
      description: Retrieves a list of revocations
      security:
        - ztSession: [ ]
        - oauth2: [ openid ]
      tags:
        - Revocation
      operationId: listRevocations
      parameters:
        - $ref: '../shared/parameters.yml#/limit'
        - $ref: '../shared/parameters.yml#/offset'
        - $ref: '../shared/parameters.yml#/filter'
      responses:
        '200':
          $ref: '#/responses/listRevocations'
        '401':
          $ref: '../shared/standard-responses.yml#/responses/unauthorizedResponse'
        '400':
          $ref: '../shared/standard-responses.yml#/responses/badRequestResponse'
        '429':
          $ref: '../shared/standard-responses.yml#/responses/rateLimitedResponse'
        '503':
          $ref: '../shared/standard-responses.yml#/responses/serverUnavailableResponse'

    post:
      summary: Create a Revocation
      description: Creates a revocation entry. Requires admin access.
      security:
        - ztSession: [ ]
        - oauth2: [ openid ]
      tags:
        - Revocation
      operationId: createRevocation
      parameters:
        - name: revocation
          in: body
          required: true
          description: A Revocation to create
          schema:
            $ref: '#/definitions/revocationCreate'
      responses:
        '201':
          $ref: '../shared/standard-responses.yml#/responses/createResponse'
        '400':
          $ref: '../shared/standard-responses.yml#/responses/badRequestResponse'
        '401':
          $ref: '../shared/standard-responses.yml#/responses/unauthorizedResponse'
        '404':
          $ref: '../shared/standard-responses.yml#/responses/notFoundResponse'
        '429':
          $ref: '../shared/standard-responses.yml#/responses/rateLimitedResponse'
        '503':
          $ref: '../shared/standard-responses.yml#/responses/serverUnavailableResponse'

  revocations-id:
    parameters:
      - $ref: '../shared/parameters.yml#/id'
    get:
      summary: Retrieves a single Revocation
      description: Retrieves a single revocation by id. Requires admin access.
      security:
        - ztSession: [ ]
        - oauth2: [ openid ]
      tags:
        - Revocation
      operationId: detailRevocation
      responses:
        '200':
          $ref: '#/responses/detailRevocation'
        '404':
          $ref: '../shared/standard-responses.yml#/responses/notFoundResponse'
        '401':
          $ref: '../shared/standard-responses.yml#/responses/unauthorizedResponse'
        '429':
          $ref: '../shared/standard-responses.yml#/responses/rateLimitedResponse'
        '503':
          $ref: '../shared/standard-responses.yml#/responses/serverUnavailableResponse'

responses:
  listRevocations:
    description: A list of revocations
    headers:
      WWW-Authenticate:
        description: "Denotes different type of security token related information"
        type: array
        items:
          type: string
    schema:
      $ref: '#/definitions/listRevocationsEnvelope'
  detailRevocation:
    description: A singular Revocation resource
    headers:
      WWW-Authenticate:
        description: "Denotes different type of security token related information"
        type: array
        items:
          type: string
    schema:
      $ref: '#/definitions/detailRevocationEnvelope'

definitions:
  listRevocationsEnvelope:
    type: object
    required:
      - meta
      - data
    properties:
      meta:
        $ref: '../shared/standard-responses.yml#/definitions/meta'
      data:
        $ref: '#/definitions/revocationList'
  detailRevocationEnvelope:
    type: object
    required:
      - meta
      - data
    properties:
      meta:
        $ref: '../shared/standard-responses.yml#/definitions/meta'
      data:
        $ref: '#/definitions/revocationDetail'
  revocationList:
    description: An array of Revocation resources
    type: array
    items:
      $ref: '#/definitions/revocationDetail'
  revocationTypeEnum:
    type: string
    enum:
      - JTI
      - IDENTITY
      - API_SESSION
  revocationDetail:
    description: A Revocation resource
    type: object
    allOf:
      - $ref: '../shared/base-entity.yml#/definitions/baseEntity'
      - type: object
        required:
          - type
          - expiresAt
        properties:
          type:
            $ref: '#/definitions/revocationTypeEnum'
          expiresAt:
            type: string
            format: date-time
  revocationCreate:
    description: A Revocation creation request
    type: object
    required:
      - id
      - type
    properties:
      id:
        type: string
      type:
        $ref: '#/definitions/revocationTypeEnum'
      tags:
        $ref: '../shared/base-entity.yml#/definitions/tags'
